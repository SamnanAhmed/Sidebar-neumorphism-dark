<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=============== REMIXICONS - Insert link for icons ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

    <!--=============== CSS ===============-->
    <link rel="stylesheet" href="assets/css/style.css">

    <title>Responsive sidebar with neumorphism dark</title>
</head>

<body>
    <!--=============== HEADER ===============-->
    <header class="header">
        <!-- Toggle menu -->
        <button class="header-toggle" id="header-toggle">
            <i class="ri-menu-line"></i>
        </button>
    </header>

    <!--=============== SIDEBAR ===============-->
    <aside class="sidebar" id="sidebar">

        <button class="sidebar-close" id="sidebar-close">
            <i class="ri-close-large-line"></i>
        </button>

        <button class="sidebar-toggle" id="sidebar-toggle">
            <i class="ri-side-bar-line"></i>
        </button>

        <div class="sidebar-data">
            <img src="assets/img/profile.jpeg" alt="" class="sidebar-profile">
            <h3 class="sidebar-name">Samnan Ahmed</h3>
            <p class="sidebar-status">Administrator</p>
        </div>

        <nav class="sidebar-menu">

            <div class="sidebar-content">

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-home-2-line sidebar-icon"></i>
                        <span class="sidebar-label">Home</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-user-line sidebar-icon"></i>
                        <span class="sidebar-label">Users</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-box-3-line sidebar-icon"></i>
                        <span class="sidebar-label">Templates</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-file-list-2-line sidebar-icon"></i>
                        <span class="sidebar-label">Invoices</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-folder-5-line sidebar-icon"></i>
                        <span class="sidebar-label">Projects</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-notification-3-line sidebar-icon"></i>
                        <span class="sidebar-label">Notifications</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-bank-card-line sidebar-icon"></i>
                        <span class="sidebar-label">Billing</span>

                    </div>
                </a>

                <a href="#" class="sidebar-link">

                    <div class="sidebar-box">

                        <div class="sidebar-glow"></div>

                    </div>

                    <div class="sidebar-group">

                        <i class="ri-settings-line sidebar-icon"></i>
                        <span class="sidebar-label">Settings</span>

                    </div>
                </a>


            </div>
            <a href="#" class="sidebar-link sidebar-link-large">

                <div class="sidebar-box">

                    <div class="sidebar-glow"></div>

                </div>

                <div class="sidebar-group">

                    <i class="ri-logout-box-line sidebar-icon"></i>
                    <span class="sidebar-label">Log Out</span>

                </div>
            </a>

        </nav>

    </aside>

    <!--=============== MAIN JS ===============-->
    <script src="assets/js/main.js"></script>
</body>

</html>
